spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/users_db
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}